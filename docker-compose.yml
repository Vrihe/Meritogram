version: '3.8'

services:
  db:
    image: mongo:latest
    container_name: mongodb_prowad
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./Backend
    container_name: backend_prowad
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    environment:
      - MONGO_URL=${MONGO_URL:-mongodb://db:27017/student_learning_db}
    depends_on:
      - db
    volumes:
      - ./Backend:/app
      - /app/node_modules

volumes:
  mongo_data: